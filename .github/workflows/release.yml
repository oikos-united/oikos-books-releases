name: Release

# Builds signed installers for macOS + Windows from the private app source and
# publishes them here (public) so the in-app auto-updater can fetch them.
# Requires repo secrets: SOURCE_PAT (read access to the private app repo),
# TAURI_SIGNING_PRIVATE_KEY (the minisign update-signing key), and the six
# APPLE_* secrets (Developer ID cert + App Store Connect API key) for macOS
# signing + notarization.
on:
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: ""
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - name: Checkout app source (private)
        uses: actions/checkout@v4
        with:
          repository: oikos-united/oikos-books
          token: ${{ secrets.SOURCE_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install

      # macOS Developer ID signing + notarization. The .app is signed with the
      # hardened runtime, the DMG notarized with Apple and stapled — downloads
      # open clean instead of "damaged and can't be opened". The .p8 secret is
      # accepted as raw PEM or base64 and validated up front so a bad paste
      # fails in seconds with instructions, not "invalidAsn1" after the build.
      - name: Prepare Apple notarization key
        if: matrix.platform == 'macos-latest'
        run: |
          if printf '%s' "$APPLE_API_KEY_CONTENT" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
          else
            printf '%s' "$APPLE_API_KEY_CONTENT" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8" 2>/dev/null || true
          fi
          if ! openssl pkey -in "$RUNNER_TEMP/AuthKey.p8" -noout 2>/dev/null; then
            echo "::error::APPLE_API_KEY_CONTENT does not parse as a valid App Store Connect .p8 key. Re-paste the exact file contents into the repo secret."
            exit 1
          fi
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          echo "notarization key OK"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      - name: Build, sign, and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Apple signing/notarization (read by the macOS bundler only)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Oikos Books v__VERSION__"
          releaseBody: "Install the file for your computer. Existing installs update themselves."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
